{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Portfolio of a Network Security Analyst and Django Developer">
    <title>{% block title %}Cyber Security & Django Developer{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <!-- SEO: Open Graph / Twitter Cards could go here -->
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">
                <span class="text-success">&lt;</span>DevSecOps<span class="text-success">/&gt;</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#skills">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#experience">Experience</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#contact">Contact</a></li>
                    <li class="nav-item ms-3">
                        <i class="bi theme-toggle bi-moon-fill"></i>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 Cyber Portfolio. All Rights Reserved.</p>
            <small>Built with Django & Bootstrap 5</small>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js" ></script>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
